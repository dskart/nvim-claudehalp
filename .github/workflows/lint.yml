name: Lint and Format

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  selene:
    name: selene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install selene
        run: |
          curl -sL "https://github.com/Kampfkarren/selene/releases/latest/download/selene-linux.zip" -o selene.zip
          unzip selene.zip -d ~/.local/bin
          chmod +x ~/.local/bin/selene

      - name: Lint
        run: make lint

  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --color always --check lua/ plugin/
